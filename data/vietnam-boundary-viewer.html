<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vietnam Boundary Viewer - Leaflet</title>

    <!-- Leaflet CDN (phiên bản stable mới nhất hiện tại) -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      :root {
        --bg: #f3f7fb;
        --panel: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #dbe4ee;
        --accent: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .app {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(180deg, #ffffff, #f8fbff);
      }

      .title-group {
        min-width: 260px;
      }

      .title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .subtitle {
        margin: 4px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn {
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        padding: 9px 14px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn:hover {
        background: #f8fafc;
      }

      .btn-primary {
        border-color: #0ea5e9;
        color: #075985;
        background: #f0f9ff;
      }

      .status {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--panel);
        font-size: 13px;
        color: var(--muted);
        max-width: 480px;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      .leaflet-popup-content {
        margin: 10px 12px;
        font-size: 13px;
      }

      .province-name {
        margin: 0 0 4px;
        font-size: 14px;
        font-weight: 700;
      }

      .province-meta {
        margin: 0;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="toolbar">
        <div class="title-group">
          <h1 class="title">Vietnam GIS - Boundary Focus</h1>
          <p class="subtitle">Click tỉnh/thành để chỉ hiển thị riêng vùng đó và khóa phạm vi kéo bản đồ.</p>
        </div>

        <div class="actions">
          <button id="resetBtn" class="btn btn-primary" type="button">Reset toàn bộ</button>
          <div id="status" class="status">Đang tải dữ liệu ranh giới Việt Nam...</div>
        </div>
      </div>

      <div id="map"></div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script>
      // Đường dẫn GeoJSON: đặt file tại public/data/vn.json để dùng trực tiếp.
      const GEOJSON_URL = './data/vn.json'

      // Style mặc định khi hiển thị đủ 63 tỉnh/thành.
      const BASE_STYLE = {
        color: '#60a5fa',
        weight: 1,
        fillColor: '#93c5fd',
        fillOpacity: 0.18,
      }

      // Style nổi bật khi chọn 1 tỉnh/thành.
      const ACTIVE_STYLE = {
        color: '#b91c1c',
        weight: 3,
        fillColor: '#ef4444',
        fillOpacity: 0.28,
      }

      const map = L.map('map', {
        zoomControl: true,
        minZoom: 5,
      }).setView([16.3, 106.2], 6)

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors',
      }).addTo(map)

      const statusEl = document.getElementById('status')
      const resetBtn = document.getElementById('resetBtn')

      let allProvincesLayer = null
      let selectedProvinceLayer = null
      let vietnamBounds = null

      function getProvinceName(feature) {
        const props = feature?.properties || {}
        return props.name || props.NAME_1 || 'Không rõ tên'
      }

      function getProvinceId(feature) {
        const props = feature?.properties || {}
        return props.id || props.ID_1 || 'N/A'
      }

      function updateStatus(message) {
        statusEl.textContent = message
      }

      function clearSelectedProvince() {
        if (selectedProvinceLayer) {
          map.removeLayer(selectedProvinceLayer)
          selectedProvinceLayer = null
        }
      }

      function resetMapView() {
        clearSelectedProvince()

        if (allProvincesLayer && !map.hasLayer(allProvincesLayer)) {
          allProvincesLayer.addTo(map)
        }

        if (vietnamBounds && vietnamBounds.isValid()) {
          map.fitBounds(vietnamBounds.pad(0.02), { animate: false })
        }

        // Bỏ giới hạn kéo map khi reset về toàn quốc.
        map.setMaxBounds(null)
        map.options.maxBoundsViscosity = 0

        updateStatus('Đang hiển thị toàn bộ ranh giới Việt Nam (63 tỉnh/thành).')
      }

      function focusProvince(feature) {
        clearSelectedProvince()

        if (allProvincesLayer && map.hasLayer(allProvincesLayer)) {
          map.removeLayer(allProvincesLayer)
        }

        // Chỉ render đúng 1 feature tỉnh/thành được chọn.
        selectedProvinceLayer = L.geoJSON(feature, {
          style: ACTIVE_STYLE,
          smoothFactor: 1.5,
          onEachFeature: (f, layer) => {
            const name = getProvinceName(f)
            const id = getProvinceId(f)
            layer.bindPopup(
              `<p class="province-name">${name}</p><p class="province-meta">Mã: ${id}</p>`
            )
          },
        }).addTo(map)

        const bounds = selectedProvinceLayer.getBounds()
        if (bounds.isValid()) {
          // Zoom vừa khít vào tỉnh và set max bounds để không kéo ra ngoài.
          map.fitBounds(bounds.pad(0.06), { animate: true })
          map.setMaxBounds(bounds.pad(0.15))
          map.options.maxBoundsViscosity = 1
        }

        selectedProvinceLayer.eachLayer((layer) => {
          if (layer.openPopup) {
            layer.openPopup()
          }
        })

        updateStatus(`Đang focus: ${getProvinceName(feature)} (${getProvinceId(feature)})`)
      }

      function attachProvinceEvents(feature, layer) {
        layer.on('click', () => focusProvince(feature))

        layer.on('mouseover', () => {
          // Highlight nhẹ khi hover lúc đang ở chế độ toàn quốc.
          if (map.hasLayer(allProvincesLayer)) {
            layer.setStyle({
              weight: 1.4,
              fillOpacity: 0.24,
            })
          }
        })

        layer.on('mouseout', () => {
          if (map.hasLayer(allProvincesLayer)) {
            layer.setStyle(BASE_STYLE)
          }
        })
      }

      async function init() {
        try {
          const response = await fetch(GEOJSON_URL)
          if (!response.ok) {
            throw new Error(`Không đọc được file GeoJSON: HTTP ${response.status}`)
          }

          const data = await response.json()
          if (data?.type !== 'FeatureCollection' || !Array.isArray(data.features)) {
            throw new Error('GeoJSON không đúng định dạng FeatureCollection.')
          }

          allProvincesLayer = L.geoJSON(data, {
            style: BASE_STYLE,
            smoothFactor: 1.5,
            onEachFeature: attachProvinceEvents,
          }).addTo(map)

          vietnamBounds = allProvincesLayer.getBounds()
          if (vietnamBounds.isValid()) {
            map.fitBounds(vietnamBounds.pad(0.02), { animate: false })
          }

          updateStatus(`Đã tải ${data.features.length} đơn vị hành chính. Click vào tỉnh/thành để focus.`)
        } catch (error) {
          console.error(error)
          updateStatus(`Lỗi: ${error.message}`)
        }
      }

      resetBtn.addEventListener('click', resetMapView)
      init()
    </script>
  </body>
</html>
